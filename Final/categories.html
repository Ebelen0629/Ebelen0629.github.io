<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | EatEasy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">EatEasy</div>
        
        <!-- Hamburger Menu Button (visible only on mobile) -->
        <button class="menu-toggle" id="menu-toggle">☰</button>
        
        <!-- Navigation Links -->
        <div class="nav-links" id="nav-menu">
            <a href="Final.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="random.html">Random Meal</a>
            <a href="recipes.html">Recipes</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="container">
    <h1 style="text-align:center; margin-bottom:2rem;">Browse by Category</h1>
    
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:1.5rem;">
        <div class="card" style="text-align:center;">
            <h3>Quick & Cheap</h3>
        </div>
        <div class="card" style="text-align:center;">
            <h3>Spicy Adventures</h3>
        </div>
        <div class="card" style="text-align:center;">
            <h3>Comfort Food</h3>
        </div>
        <div class="card" style="text-align:center;">
            <h3>Healthy-ish</h3>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 EatEasy - Solving Food Indecision in Fort Drum, NY (North Country)</p>
</footer>

<script>
    document.getElementById("menu-toggle").addEventListener("click", () => {
        document.getElementById("nav-menu").classList.toggle("active");
    });
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
            document.getElementById("nav-menu").classList.remove("active");
        });
    });
</script>

</body>
</html>
