<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | EatEasy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">EatEasy</div>
        
        <button class="menu-toggle" id="menu-toggle">☰</button>
        
        <div class="nav-links" id="nav-menu">
            <a href="Final.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="random.html">Random Meal</a>
            <a href="recipes.html">Recipes</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="container" style="max-width:600px;">
    <h1 style="text-align:center; margin-bottom:2rem;">Got a Craving or Suggestion?</h1>
    
    <div class="card">
        <div class="card-content">
            <form>
                <p><input type="text" placeholder="Your Name" style="width:100%; padding:0.8rem; margin-bottom:1rem;"></p>
                <p><input type="email" placeholder="Your Email" style="width:100%; padding:0.8rem; margin-bottom:1rem;"></p>
                <p><textarea placeholder="Your message or food idea..." rows="6" style="width:100%; padding:0.8rem;"></textarea></p>
                <button type="button" class="btn btn-orange" style="width:100%;">Send Message</button>
            </form>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 EatEasy - Solving Food Indecision in Fort Drum, NY (North Country)</p>
</footer>

<script>
    document.getElementById("menu-toggle").addEventListener("click", () => {
        document.getElementById("nav-menu").classList.toggle("active");
    });
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
            document.getElementById("nav-menu").classList.remove("active");
        });
    });
</script>

</body>
</html>
