<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | EatEasy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">EatEasy</div>
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div class="nav-links" id="nav-menu">
            <a href="Final.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="random.html">Random Meal</a>
            <a href="recipes.html">Recipes</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="container" style="max-width:600px;">
    <h1 style="text-align:center; margin-bottom:2rem;">Got a Craving or Suggestion?</h1>
    <p style="text-align:center; margin-bottom:2.5rem;">Send us a message and we'll reply as soon as possible!</p>
    
    <div class="card">
        <div class="card-content">
            <form action="https://formsubmit.co/edbelenjr@gmail.com" method="POST">
                
                <input type="text" name="name" placeholder="Your Name" required 
                      style="width:100%; padding:0.9rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:8px;">
                
                <input type="email" name="email" placeholder="Your Email" required 
                      style="width:100%; padding:0.9rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:8px;">
                
                <textarea name="message" placeholder="Your message or food idea..." rows="6" required
                          style="width:100%; padding:0.9rem; margin-bottom:1.5rem; border:1px solid #ddd; border-radius:8px; resize:vertical;"></textarea>
                
                <input type="hidden" name="_subject" value="New Message from EatEasy Website!">
                <input type="hidden" name="_next" value="thankyou.html">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">

                <button type="submit" class="btn btn-orange" style="width:100%; padding:1rem;">
                    Send Message
                </button>
            </form>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 EatEasy - Solving Food Indecision</p>
</footer>

<script>
    // Mobile Menu
    document.getElementById("menu-toggle").addEventListener("click", () => {
        document.getElementById("nav-menu").classList.toggle("active");
    });
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
            document.getElementById("nav-menu").classList.remove("active");
        });
    });
</script>

</body>
</html>
