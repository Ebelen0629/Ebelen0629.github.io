<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz | EatEasy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .progress { height: 8px; background: #ff6b35; margin-bottom: 2rem; border-radius: 10px; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.8rem 0;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .option-btn:hover, .option-btn.selected {
            border-color: #ff6b35;
            background: #fffaf5;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo">EatEasy</div>
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div class="nav-links" id="nav-menu">
            <a href="Final.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="random.html">Random Meal</a>
            <a href="recipes.html">Recipes</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="container" style="max-width:720px; margin-top:3rem;">
    <h1 style="text-align:center; margin-bottom:1rem;">What Should I Eat?</h1>
    
    <div id="quiz-container">
        <div class="progress" id="progress-bar" style="width:25%;"></div>
        
        <div class="card">
            <div class="card-content">
                <h3 id="question-text" style="margin-bottom:1.5rem;">Question 1 of 4</h3>
                <p id="question-desc" style="font-size:1.15rem; margin-bottom:2rem;"></p>
                
                <div id="options"></div>
                
                <button id="next-btn" class="btn btn-orange" style="width:100%; margin-top:2rem; display:none;">
                    Next Question
                </button>
            </div>
        </div>
    </div>

    <div id="recommendation-container" style="display:none; text-align:center;">
        <h2 style="margin:2rem 0 1rem;">Here's Your Perfect Meal!</h2>
        
        <div id="recommended-meal" class="card" style="max-width: 500px; margin: 0 auto;">
            <img id="meal-image" src="" alt="" style="height: 260px;">
            <div class="card-content">
                <h3 id="meal-name"></h3>
                <p id="meal-tags" style="margin: 0.8rem 0; font-weight: bold;"></p>
                <p id="meal-desc"></p>
                <a id="view-recipe-btn" href="#" class="btn btn-orange" style="margin-top: 1.5rem;">
                    View Full Recipe
                </a>
            </div>
        </div>

        <div style="margin-top: 3rem;">
            <a href="quiz.html" class="btn btn-gray">Take Quiz Again</a>
            <a href="random.html" class="btn btn-orange" style="margin-left: 1rem;">Try Random Meal</a>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 EatEasy - Solving Food Indecision</p>
</footer>

<script>

const meals = [
    { name: "Classic Philly Cheesesteak", tags: "Quick • Comfort • $$", desc: "Tender beef, melted cheese, peppers & onions on a fresh roll.", image: "images/cheesesteak.jpg", file: "recipe-cheesesteak.html", mood: ["Hangry"], time: ["Quick"], craving: ["Savory", "Comfort"] },
    { name: "Creamy Garlic Pasta", tags: "Quick • Comfort • $", desc: "Rich garlic cream sauce with parmesan — a cozy North Country favorite.", image: "images/pasta.jpg", file: "recipe-pasta.html", mood: ["Tired", "Chill"], time: ["Quick", "Normal"], craving: ["Pasta", "Comfort"] },
    { name: "North Country Burger", tags: "Comfort • $$", desc: "Juicy burger with cheese and bacon.", image: "images/burger.jpg", file: "recipe-burger.html", mood: ["Hangry"], time: ["Quick"], craving: ["Savory", "Comfort"] },
    { name: "Pulled Pork Sandwich", tags: "Comfort • $$", desc: "Slow-cooked pulled pork with BBQ sauce.", image: "images/pulledpork.jpg", file: "recipe-pulledpork.html", mood: ["Hangry", "Chill"], time: ["Normal"], craving: ["Comfort"] },
    { name: "Veggie Stir-Fry Bowl", tags: "Healthy • Quick • $", desc: "Fresh vegetables stir-fried with rice and light sauce.", image: "images/stirfry.jpg", file: "recipe-stirfry.html", mood: ["Chill"], time: ["Quick"], craving: ["Healthy"] },
    { name: "Breakfast Skillet", tags: "Comfort • $", desc: "Eggs, potatoes, sausage & cheese — perfect North Country breakfast.", image: "images/breakfast.jpg", file: "recipe-breakfast.html", mood: ["Tired"], time: ["Normal"], craving: ["Comfort"] },
    { name: "Chicken Quesadilla", tags: "Quick • Savory • $", desc: "Cheesy chicken quesadilla with salsa and sour cream.", image: "images/quesadilla.jpg", file: "recipe-quesadilla.html", mood: ["Hangry"], time: ["Quick"], craving: ["Savory"] },
    { name: "Beef Stew", tags: "Comfort • $$", desc: "Hearty beef stew with carrots, potatoes and warm bread.", image: "images/stew.jpg", file: "recipe-stew.html", mood: ["Chill", "Tired"], time: ["Normal"], craving: ["Comfort"] },
    { name: "Buffalo Chicken Wrap", tags: "Quick • Spicy • $", desc: "Spicy buffalo chicken wrapped with lettuce and ranch.", image: "images/wrap.jpg", file: "recipe-wrap.html", mood: ["Hangry"], time: ["Quick"], craving: ["Savory"] },
    { name: "Margherita Flatbread Pizza", tags: "Quick • Comfort • $$", desc: "Fresh mozzarella, basil and tomato sauce on flatbread.", image: "images/pizza.jpg", file: "recipe-pizza.html", mood: ["Chill"], time: ["Quick"], craving: ["Savory"] },
    { name: "Salmon Rice Bowl", tags: "Healthy • $", desc: "Grilled salmon over rice with avocado and vegetables.", image: "images/salmon.jpg", file: "recipe-salmon.html", mood: ["Chill"], time: ["Normal"], craving: ["Healthy"] },
    { name: "Apple Cinnamon Pancakes", tags: "Comfort • $", desc: "Fluffy pancakes with warm apples and cinnamon syrup.", image: "images/pancakes.jpg", file: "recipe-pancakes.html", mood: ["Tired"], time: ["Normal"], craving: ["Comfort"] }
];

let answers = {};
let currentQuestion = 0;

const questions = [
    { q: "How are you feeling right now?", options: ["Hangry 😡", "Tired 😴", "Chill 😌", "Adventurous 🔥"], key: "mood" },
    { q: "How much time do you have?", options: ["Quick (<15 min)", "Normal (15-30 min)", "I can cook a bit"], key: "time" },
    { q: "What are you craving?", options: ["Savory", "Comfort Food", "Pasta", "Something Healthy"], key: "craving" },
    { q: "Any dietary preference?", options: ["No restrictions", "Vegetarian"], key: "diet" }
];

function renderQuestion() {
    const q = questions[currentQuestion];
    document.getElementById("question-text").textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    document.getElementById("question-desc").textContent = q.q;
    
    let html = '';
    q.options.forEach(opt => {
        html += `<button class="option-btn" onclick="selectOption(this, '${opt}')">${opt}</button>`;
    });
    document.getElementById("options").innerHTML = html;
    
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("progress-bar").style.width = `${((currentQuestion)/questions.length)*100}%`;
}

window.selectOption = function(btn, value) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers[questions[currentQuestion].key] = value;
    document.getElementById("next-btn").style.display = "block";
};

document.getElementById("next-btn").addEventListener("click", () => {
    currentQuestion++;
    if (currentQuestion < questions.length) {
        renderQuestion();
    } else {
        showRecommendation();
    }
});

function showRecommendation() {
    document.getElementById("quiz-container").style.display = "none";
    document.getElementById("recommendation-container").style.display = "block";

    // Smart scoring to pick best match
    let bestMeal = meals[0];
    let bestScore = -1;

    meals.forEach(meal => {
        let score = 0;
        if (meal.mood && meal.mood.includes(answers.mood)) score += 3;
        if (meal.time && meal.time.includes(answers.time)) score += 2;
        if (meal.craving && meal.craving.includes(answers.craving)) score += 4;
        
        if (score > bestScore) {
            bestScore = score;
            bestMeal = meal;
        }
    });

    document.getElementById("meal-image").src = bestMeal.image;
    document.getElementById("meal-name").textContent = bestMeal.name;
    document.getElementById("meal-tags").textContent = bestMeal.tags;
    document.getElementById("meal-desc").textContent = bestMeal.desc;
    document.getElementById("view-recipe-btn").href = bestMeal.file;
}

document.getElementById("menu-toggle").addEventListener("click", () => {
    document.getElementById("nav-menu").classList.toggle("active");
});

document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
        document.getElementById("nav-menu").classList.remove("active");
    });
});

renderQuestion();
</script>

</body>
</html>
