<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz | EatEasy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .progress { height: 8px; background: #ff6b35; margin-bottom: 2rem; border-radius: 10px; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.8rem 0;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover, .option-btn.selected {
            border-color: #ff6b35;
            background: #fffaf5;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo">EatEasy</div>
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div class="nav-links" id="nav-menu">
            <a href="Final.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="random.html">random</a>
            <a href="recipes.html">Recipes</a>
            <a href="local-eats.html">North Country Spots</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="container" style="max-width:720px; margin-top:3rem;">
    <h1 style="text-align:center; margin-bottom:1rem;">What Should I Eat in the North Country?</h1>
    
    <div id="quiz-container">
        <div class="progress" id="progress-bar" style="width:25%;"></div>
        
        <div class="card">
            <div class="card-content">
                <h3 id="question-text" style="margin-bottom:1.5rem;">Question 1 of 4</h3>
                <p id="question-desc" style="font-size:1.15rem; margin-bottom:2rem;"></p>
                
                <div id="options"></div>
                
                <button id="next-btn" class="btn btn-orange" style="width:100%; margin-top:2rem; display:none;">Next Question</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 EatEasy - Solving Food Indecision in Fort Drum, NY (North Country)</p>
</footer>

<script>
// Quiz Questions
const questions = [
    { q: "How are you feeling right now?", options: ["Hangry 😡", "Tired 😴", "Chill 😌", "Adventurous 🔥"], key: "mood" },
    { q: "How much time do you have?", options: ["Quick (<15 min)", "Normal (15-30 min)", "I can cook"], key: "time" },
    { q: "What are you craving?", options: ["Savory", "Comfort Food", "Pasta", "Something Healthy"], key: "craving" },
    { q: "Any dietary preference?", options: ["No restrictions", "Vegetarian"], key: "diet" }
];

// Meal Database with links to recipe pages
const meals = [
    { name: "Classic Philly Cheesesteak", file: "recipe-cheesesteak.html", tags: "Quick • Comfort • $$", desc: "Tender beef, melted cheese, peppers & onions on a toasted roll." },
    { name: "Creamy Garlic Pasta", file: "recipe-pasta.html", tags: "Quick • Comfort • $", desc: "Rich garlic cream sauce with parmesan — a cozy North Country favorite." },
    { name: "North Country Burger", file: "recipe-burger.html", tags: "Comfort • $$", desc: "Juicy burger with cheese and bacon." },
    { name: "Pulled Pork Sandwich", file: "recipe-pulledpork.html", tags: "Comfort • $$", desc: "Slow-cooked pulled pork with BBQ sauce." },
    { name: "Veggie Stir-Fry Bowl", file: "recipe-stirfry.html", tags: "Healthy • Quick • $", desc: "Fresh vegetables stir-fried with rice." },
    { name: "Breakfast Skillet", file: "recipe-breakfast.html", tags: "Comfort • $", desc: "Eggs, potatoes, sausage & cheese." }
];

let answers = {};
let currentQuestion = 0;

function renderQuestion() {
    const q = questions[currentQuestion];
    document.getElementById("question-text").textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    document.getElementById("question-desc").textContent = q.q;
    
    let html = '';
    q.options.forEach(opt => {
        html += `<button class="option-btn" onclick="selectOption(this, '${opt}')">${opt}</button>`;
    });
    document.getElementById("options").innerHTML = html;
    
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("progress-bar").style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
}

window.selectOption = function(btn, value) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    answers[questions[currentQuestion].key] = value;
    document.getElementById("next-btn").style.display = "block";
};

document.getElementById("next-btn").addEventListener("click", () => {
    currentQuestion++;
    if (currentQuestion < questions.length) {
        renderQuestion();
    } else {
        // Pass answers to random page using URL parameters
        const params = new URLSearchParams(answers);
        window.location.href = `random.html?${params.toString()}`;
    }
});

// Mobile Menu
function toggleMenu() {
    document.getElementById("nav-menu").classList.toggle("active");
}

document.getElementById("menu-toggle").addEventListener("click", toggleMenu);

// Start the quiz
renderQuestion();
</script>

</body>
</html>
