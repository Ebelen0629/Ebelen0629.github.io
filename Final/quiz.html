<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz | EatEasy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .progress { height: 8px; background: #ff6b35; margin-bottom: 2rem; border-radius: 10px; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.8rem 0;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: left;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .option-btn:hover, .option-btn.selected {
            border-color: #ff6b35;
            background: #fffaf5;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo">EatEasy</div>
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div class="nav-links" id="nav-menu">
            <a href="index.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="random.html">Random Meal</a>
            <a href="recipes.html">Recipes</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="container" style="max-width:720px; margin-top:3rem;">
    <h1 style="text-align:center; margin-bottom:1rem;">What Should I Eat in the North Country?</h1>
    
    <div id="quiz-container">
        <div class="progress" id="progress-bar" style="width:25%;"></div>
        
        <div class="card">
            <div class="card-content">
                <h3 id="question-text" style="margin-bottom:1.5rem;">Question 1 of 4</h3>
                <p id="question-desc" style="font-size:1.15rem; margin-bottom:2rem;"></p>
                
                <div id="options"></div>
                
                <button id="next-btn" class="btn btn-orange" style="width:100%; margin-top:2rem; display:none;">Next Question</button>
            </div>
        </div>
    </div>

    <!-- Results Section (now leads to random page) -->
    <div id="results-container" style="display:none; text-align:center;">
        <h2 style="margin:2rem 0;">Quiz Complete!</h2>
        <p style="font-size:1.2rem; margin-bottom:2rem;">Let's find you a random meal idea from the North Country.</p>
        <a href="random.html" class="btn btn-orange" style="font-size:1.3rem; padding:1rem 3rem;">Show Me a Random Meal</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 EatEasy - Solving Food Indecision in Fort Drum, NY (North Country)</p>
</footer>

<script>
// Quiz Data
const questions = [
    { q: "How are you feeling right now?", options: ["Hangry 😡", "Tired 😴", "Chill 😌", "Adventurous 🔥"], key: "mood" },
    { q: "How much time do you have to eat?", options: ["Quick (<15 min)", "Normal (15-30 min)", "I can cook a bit"], key: "time" },
    { q: "What are you craving?", options: ["Savory", "Comfort Food", "Pasta", "Something Healthy"], key: "craving" },
    { q: "Any dietary preference?", options: ["No restrictions", "Vegetarian"], key: "diet" }
];

let currentQuestion = 0;

function renderQuestion() {
    const q = questions[currentQuestion];
    document.getElementById("question-text").textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    document.getElementById("question-desc").textContent = q.q;
    
    let html = '';
    q.options.forEach(opt => {
        html += `<button class="option-btn" onclick="selectOption(this, '${opt}')">${opt}</button>`;
    });
    document.getElementById("options").innerHTML = html;
    
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("progress-bar").style.width = `${((currentQuestion)/questions.length)*100}%`;
}

window.selectOption = function(btn, value) {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById("next-btn").style.display = "block";
};

document.getElementById("next-btn").addEventListener("click", () => {
    currentQuestion++;
    if (currentQuestion < questions.length) {
        renderQuestion();
    } else {
        document.getElementById("quiz-container").style.display = "none";
        document.getElementById("results-container").style.display = "block";
    }
});

// Mobile Menu
document.getElementById("menu-toggle").addEventListener("click", () => {
    document.getElementById("nav-menu").classList.toggle("active");
});

document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
        document.getElementById("nav-menu").classList.remove("active");
    });
});

// Start quiz
renderQuestion();
</script>

</body>
</html>
