<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Meal Ideas | EatEasy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">EatEasy</div>
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div class="nav-links" id="nav-menu">
            <a href="Final.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="results.html">Results</a>
            <a href="recipes.html">Recipes</a>
            <a href="local-eats.html">North Country Spots</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="hero">
    <div class="container">
        <h1>Your Meal Ideas!</h1>
        <p id="user-vibe" style="margin-top:0.5rem; opacity:0.9;"></p>
    </div>
</div>

<div class="container">
    <div id="meal-results" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(340px,1fr)); gap:2rem;">
        <!-- Meal cards will be inserted here by JavaScript -->
    </div>

    <div style="text-align:center; margin:3rem 0;">
        <a href="quiz.html" class="btn btn-orange">Take Quiz Again</a>
        <a href="recipes.html" class="btn btn-gray">Browse All Recipes</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 EatEasy - Solving Food Indecision in Fort Drum, NY (North Country)</p>
</footer>

<script>
// Get answers from URL
const urlParams = new URLSearchParams(window.location.search);
const answers = {
    mood: urlParams.get('mood') || 'Hangry',
    time: urlParams.get('time') || 'Quick',
    craving: urlParams.get('craving') || 'Comfort Food',
    diet: urlParams.get('diet') || 'No restrictions'
};

// Display user vibe summary
document.getElementById("user-vibe").textContent = 
    `Based on: ${answers.mood} • ${answers.time} • ${answers.craving}`;

// Meal database with links to your recipe pages
const meals = [
    {
        name: "Classic Philly Cheesesteak",
        file: "recipe-cheesesteak.html",
        tags: "Quick • Comfort • $$",
        desc: "Tender beef, melted cheese, peppers & onions on a toasted roll."
    },
    {
        name: "Creamy Garlic Pasta",
        file: "recipe-pasta.html",
        tags: "Quick • Comfort • $",
        desc: "Rich garlic cream sauce with parmesan — a cozy North Country favorite."
    },
    {
        name: "North Country Burger",
        file: "recipe-burger.html",
        tags: "Comfort • $$",
        desc: "Juicy burger with cheese and bacon."
    },
    {
        name: "Pulled Pork Sandwich",
        file: "recipe-pulledpork.html",
        tags: "Comfort • $$",
        desc: "Slow-cooked pulled pork with BBQ sauce."
    },
    {
        name: "Veggie Stir-Fry Bowl",
        file: "recipe-stirfry.html",
        tags: "Healthy • Quick • $",
        desc: "Fresh vegetables stir-fried with rice."
    },
    {
        name: "Breakfast Skillet",
        file: "recipe-breakfast.html",
        tags: "Comfort • $",
        desc: "Eggs, potatoes, sausage & cheese."
    }
];

// Filter meals based on user answers
function getRecommendedMeals() {
    let matches = meals.filter(meal => {
        let score = 0;
        if (answers.mood === "Hangry" && ["Classic Philly Cheesesteak", "North Country Burger", "Pulled Pork Sandwich"].includes(meal.name)) score += 2;
        if (answers.mood === "Tired" && ["Creamy Garlic Pasta", "Breakfast Skillet"].includes(meal.name)) score += 2;
        if (answers.mood === "Chill" && ["Creamy Garlic Pasta", "Pulled Pork Sandwich"].includes(meal.name)) score += 1;
        
        if (answers.time.includes("Quick") && ["Quick", "Quick • Comfort"].some(t => meal.tags.includes(t))) score += 1;
        if (answers.craving === "Pasta" && meal.name === "Creamy Garlic Pasta") score += 2;
        if (answers.craving === "Comfort Food" && ["Comfort"].some(c => meal.tags.includes(c))) score += 1;
        if (answers.diet === "Vegetarian" && meal.name === "Veggie Stir-Fry Bowl") score += 2;
        
        return score >= 1;
    });

    // If no strong matches, show 3 popular ones
    if (matches.length < 2) {
        matches = meals.slice(0, 3);
    }
    
    return matches;
}

// Display the recommended meals
function displayResults() {
    const recommended = getRecommendedMeals();
    let html = '';
    
    recommended.forEach(meal => {
        html += `
        <div class="card">
            <img src="images/${meal.name.toLowerCase().replace(/ /g, '-')}.jpg" alt="${meal.name}">
            <div class="card-content">
                <h3>${meal.name}</h3>
                <p><strong>${meal.tags}</strong></p>
                <p>${meal.desc}</p>
                <a href="${meal.file}" class="btn btn-orange">View Full Recipe</a>
            </div>
        </div>`;
    });
    
    document.getElementById("meal-results").innerHTML = html;
}

// Mobile Menu Toggle
function toggleMenu() {
    document.getElementById("nav-menu").classList.toggle("active");
}

document.getElementById("menu-toggle").addEventListener("click", toggleMenu);

// Initialize page
window.onload = displayResults;
</script>

</body>
</html>
