<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | EatEasy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">EatEasy</div>
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div class="nav-links" id="nav-menu">
            <a href="Final.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="random.html">Random Meal</a>
            <a href="recipes.html">Recipes</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<div class="container" style="text-align: center; max-width: 700px; margin-top: 4rem;">
    <div class="card" style="padding: 3rem 2rem;">
        <h1 style="color: #ff6b35; font-size: 2.8rem; margin-bottom: 1rem;">Thank You! 🎉</h1>
        <p style="font-size: 1.3rem; margin-bottom: 2rem;">
            Your message has been sent successfully.<br>
            We'll get back to you as soon as possible!
        </p>
        
        <a href="Final.html" class="btn btn-orange" style="font-size: 1.2rem; padding: 1rem 2.5rem;">
            Return to Home
        </a>
    </div>
</div>

<footer>
    <p>&copy; 2026 EatEasy - Solving Food Indecision</p>
</footer>

<script>
    // Mobile Menu
    document.getElementById("menu-toggle").addEventListener("click", () => {
        document.getElementById("nav-menu").classList.toggle("active");
    });
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
            document.getElementById("nav-menu").classList.remove("active");
        });
    });
</script>

</body>
</html>
