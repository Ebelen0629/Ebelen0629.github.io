<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Order Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            display: flex;
            justify-content: center;
            background-color: #f9f9f9;
        }
        .container {
            width: 800px;
            max-width: 100%;
            border: 3px solid #000;
            padding: 20px;
            background-color: #fff;
        }
        h1 {
            color: purple;
            text-align: center;
            margin: 0 1.5em;
            font-size: 2.2em;
        }
        .grid, .product-grid, .total-grid {
            display: grid;
            gap: 0.25em; 
            align-items: center; 
        }
        .grid .label {
            font-weight: bold;
        }
        .product-grid {
            grid-template-columns: 40% 20% 20% 20%;
            grid-template-rows: 2.5em repeat(5, 2.5em);
            margin: 1.5em;
        }
        .product-grid .header {
            font-weight: bold;
            text-align: center;
            background-color: #ddd;
            padding: 0.5em;
            border: 1px solid #000;
        }
        .product-grid input {
            width: 100%;
            padding: 0.5em;
            box-sizing: border-box;
            border: 1px solid #000;
            text-align: center;
        }
        .separator {
            width: 100%;
            height: 2.0em;
            background-color: #000;
        }
        .total-grid {
            grid-template-columns: 60% 40%;
            grid-template-rows: repeat(4, 2.5em);
            margin-top: 1em;
            width: 60%;
            margin-left: auto;
        }
        .total-grid .label {
            font-weight: bold;
            text-align: right;
            padding-right: 1.25em;
        }
        .total-grid .value {
            text-align: right;
            font-weight: bold;
            border: 1px solid #000;
            padding: 0.5em;
        }
        .total-grid input {
            width: 100%;
            text-align: right;
            border: none;
            background: transparent;
            font-weight: bold;
        }
        input[type="number"] {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Customer Order Form</h1>            

        <div class="grid">
            <div class="label">Order Number</div>
            <div><input type="text"></div>
            <div class="label">Order Date</div>
            <div><input type="date"></div>
        </div>

        <div class="product-grid">
            <div class="header">Product Name</div>
            <div class="header">Color</div>
            <div class="header">Quantity</div>
            <div class="header">Price</div>
            
            <input type="text">
            <input type="text">
            <input type="number" min="0" step="1">
            <input type="text">
            
            <input type="text">
            <input type="text">
            <input type="number" min="0" step="1">
            <input type="text">
            
            <input type="text">
            <input type="text">
            <input type="number" min="0" step="1">
            <input type="text">
            
            <input type="text">
            <input type="text">
            <input type="number" min="0" step="1">
            <input type="text">
            
            <input type="text">
            <input type="text">
            <input type="number" min="0" step="1">
            <input type="text">
        </div>

        <div class="separator"></div>

        <div class="total-grid">
            <div class="label">Subtotal</div>
            <div class="value"><input type="text" placeholder="0.00"></div>
            
            <div class="label">Tax</div>
            <div class="value"><input type="text" placeholder="0.00"></div>
            
            <div class="label">Shipping</div>
            <div class="value">5.95</div>
            
            <div class="label">Total</div>
            <div class="value"><input type="text" placeholder="0.00"></div>
        </div>
    </div>
</body>
</html>
