<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDA Food Pyramid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 50%;
        }
        caption {
            font-size: 2.8em;
            font-weight: bold;
            padding: 15px 20px; 
            background-color: #f0f0f0;
            border-bottom: none;
        }
        thead th {
            background-color: #006400;
            border: 1px solid #000000;
            color: white;
            padding: 12px;
            border: 1px solid #000000;
        }
        tbody td {
            padding: 12px;
            border: 1px solid #000;
        }
        tbody td:first-child {
            text-align: left;
            font-weight: bold;
        }
        tbody td:first-child .examples {
            font-weight: normal;
            font-style: italic;
        }
        tbody td:nth-child(2),
        tbody td:nth-child(3) {
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <caption>USDA Food Pyramid</caption>
        <thead>
            <tr>
                <th rowspan="2">Food Group</th>
                <th colspan="2">Serving Guidelines</th>
            </tr>
            <tr>
                <th>2005-2010</th>
                <th>2011 present</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Dairy</strong><br><span class="examples">(milk, yogurt, cheese)</span></td>
                <td>2-3</td>
                <td>3-4</td>
            </tr>
            <tr>
                <td><strong>Meat and Beans</strong><br><span class="examples">(beef, poultry, fish, beans)</span></td>
                <td>2-3</td>
                <td>5-6</td>
            </tr>
            <tr>
                <td><strong>Fruits</strong></td>
                <td>2-4</td>
                <td>3-4</td>
            </tr>
            <tr>
                <td><strong>Vegetables</strong></td>
                <td>3-5</td>
                <td>1-2</td>
            </tr>
            <tr>
                <td><strong>Grains</strong><br><span class="examples">(bread, donuts, pop tarts)</span></td>
                <td>1-2</td>
                <td>3-5</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
